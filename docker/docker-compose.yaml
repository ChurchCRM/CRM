services:
  database:
    profiles: [test, ci]
    image: mariadb:10.11
    ports:
      - ${DATABASE_PORT:-3306}:3306
    env_file:
      - .env
    volumes:
      - ../cypress/data:/docker-entrypoint-initdb.d
    hostname: crm-database
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      timeout: 20s
      retries: 10

  mailserver:
    profiles: [test]
    image: axllent/mailpit:latest
    ports:
      - ${MAILSERVER_PORT:-1025}:1025
      - ${MAILSERVER_GUI_PORT:-8025}:8025
    hostname: crm-mailserver

  webserver:
    profiles: [test, ci]
    build:
      context: .
      dockerfile: Dockerfile.churchcrm-apache-php8
      target: test
    image: churchcrm/crm:php8-debian
    ports:
      - ${WEBSERVER_PORT:-80}:80
    volumes:
      - ../src:/var/www/html
      - ..:/home/ChurchCRM
      - ../cypress/data/images/people:/var/www/html/Images/Person
      - ../cypress/data/images/family:/var/www/html/Images/Family
    hostname: crm-webserver
    env_file:
      - .env
    depends_on:
      database:
        condition: service_healthy
