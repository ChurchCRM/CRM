name: ✨ Feature request
description: Share an idea to make ChurchCRM better
title: "Feature: "
type: Feature
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing your idea! 💡

        Filing it as a GitHub issue is the right move — that's how we triage, track, and ship. Please fill out the form below.

        **Want to brainstorm or gauge interest first?** Join our Discord for real-time chat, then come back and open this issue so the idea doesn't get lost:
        👉 <https://discord.gg/tuWyFzj3Nj>

  - type: textarea
    id: feature
    attributes:
      label: What would you like to see?
      description: Describe the feature or improvement.
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Why does it matter?
      description: What problem does it solve, or how would it help?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered (optional)
      description: Any workarounds, plugins, or other approaches you've tried?

  - type: textarea
    id: screenshots
    attributes:
      label: Mockups / screenshots (optional)
      description: Drag & drop images, or paste a Cypress Recorder export if you've prototyped a workflow.

  - type: markdown
    attributes:
      value: |
        ---
        💬 **Want to discuss in real time?** <https://discord.gg/tuWyFzj3Nj>
        📚 **Documentation:** <https://docs.churchcrm.io>
