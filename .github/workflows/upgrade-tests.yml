name: Upgrade Tests

# Runs when a release is published (automatic) or on demand via workflow_dispatch.
# Upgrade tests are intentionally kept out of the normal build-test-package CI so they
# never block a PR or push build.  They run against a full build produced here.
on:
  workflow_dispatch:
    inputs:
      php-versions:
        description: 'PHP versions to test (JSON array, e.g. ["8.4","8.5"])'
        required: false
        default: '["8.4","8.5"]'
  release:
    types: [published]

permissions:
  contents: read
  checks: write
  actions: read

jobs:
  # ---------------------------------------------------------------------------
  # Determine PHP versions to test.
  # On release: always test all supported versions.
  # On workflow_dispatch: use the input (defaults to all supported versions).
  # ---------------------------------------------------------------------------
  configure:
    runs-on: ubuntu-latest
    outputs:
      php-versions: ${{ steps.set-matrix.outputs.php-versions }}
    steps:
    - id: set-matrix
      env:
        PHP_VERSIONS_INPUT: ${{ github.event.inputs.php-versions }}
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          echo "php-versions=$PHP_VERSIONS_INPUT" >> $GITHUB_OUTPUT
        else
          echo 'php-versions=["8.4","8.5"]' >> $GITHUB_OUTPUT
        fi

  # ---------------------------------------------------------------------------
  # Build the app and Docker images, upload as a workflow artifact so the
  # parallel upgrade test jobs can share it without rebuilding from scratch.
  # ---------------------------------------------------------------------------
  build:
    needs: configure
    timeout-minutes: 30
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v7
      with:
        fetch-depth: 0

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version-file: '.nvmrc'
        cache: 'npm'

    - name: Install npm dependencies
      run: npm ci

    - name: Set up PHP 8.4
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.4'
        extensions: pdo_mysql, mysqli, gd, zip, gettext, iconv, mbstring, xml, curl, fileinfo, bcmath
        coverage: none

    - name: Get Composer cache directory
      id: composer-cache
      run: |
        cd src
        echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

    - name: Cache Composer packages
      uses: actions/cache@v6
      with:
        path: ${{ steps.composer-cache.outputs.dir }}
        key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
        restore-keys: ${{ runner.os }}-composer-

    - name: Install Composer dependencies
      env:
        COMPOSER_MEMORY_LIMIT: -1
      run: |
        cd src
        composer install --no-dev --no-interaction --prefer-dist

    - name: Build app
      run: npm run package

    - name: Validate PHP syntax
      run: npm run build:php:validate

    - name: Build Docker images
      env:
        PHP_VERSIONS: ${{ needs.configure.outputs.php-versions }}
      run: |
        for version in $(echo "$PHP_VERSIONS" | jq -r '.[]'); do
          echo "Building Docker image for PHP $version..."
          docker build --target test \
            --build-arg PHP_VERSION=$version \
            -t churchcrm/crm:php${version}-test \
            -f docker/Dockerfile.churchcrm-apache-php8 docker/
          docker save churchcrm/crm:php${version}-test | gzip > temp/docker-image-${version}.tar.gz
          echo "Saved: $(du -h temp/docker-image-${version}.tar.gz | cut -f1)"
        done

    - name: Upload build artifact
      uses: actions/upload-artifact@v7
      with:
        name: build-${{ github.run_id }}
        path: |
          src/
          temp/
          !src/logs
        retention-days: 1

  # ---------------------------------------------------------------------------
  # Upgrade test: ChurchCRM 6.0.0 → current
  # Restores a 6.0.0 SQL snapshot, lets the bootstrapper auto-migrate, and
  # verifies login + API smoke checks.
  # ---------------------------------------------------------------------------
  test-upgrade-from-6:
    needs: [configure, build]
    timeout-minutes: 30
    permissions:
      contents: read
      checks: write
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php-version: ${{ fromJSON(needs.configure.outputs.php-versions) }}
    steps:
    - name: Checkout
      uses: actions/checkout@v7

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version-file: '.nvmrc'
        cache: 'npm'

    - name: Install npm dependencies
      run: npm ci

    - name: Download build artifact
      uses: actions/download-artifact@v8.0.1
      with:
        name: build-${{ github.run_id }}
        path: .

    - name: Load Docker image
      run: |
        docker load < temp/docker-image-${{ matrix.php-version }}.tar.gz
        docker tag churchcrm/crm:php${{ matrix.php-version }}-test churchcrm/crm:php8-debian

    - name: Generate file signatures
      run: node scripts/generate-signatures-node.js

    - name: Remove Config.php for fresh install
      run: rm -f src/Include/Config.php

    - name: Start Docker (upgrade from 6.0.0)
      run: docker compose -f docker/docker-compose.yaml -f docker/docker-compose.parallel.yaml --profile ci-new-system up -d

    - name: Wait for server
      run: |
        max_attempts=12
        attempt=1
        until curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8081/ | grep -q "302\|200"; do
          if [ $attempt -eq $max_attempts ]; then
            echo "Server failed to respond after $max_attempts attempts"
            docker compose -f docker/docker-compose.yaml -f docker/docker-compose.parallel.yaml --profile ci-new-system ps -a
            docker compose -f docker/docker-compose.yaml -f docker/docker-compose.parallel.yaml --profile ci-new-system logs
            exit 1
          fi
          echo "Attempt $attempt/$max_attempts — retrying in 5s..."
          sleep 5
          attempt=$((attempt + 1))
        done
        echo "Server ready."

    - name: Run Cypress upgrade test (6.0.0 → current, PHP ${{ matrix.php-version }})
      uses: cypress-io/github-action@v7
      with:
        command: npx cypress run --config-file cypress/configs/upgrade.config.ts --headless --browser electron --reporter junit --reporter-options mochaFile=cypress/reports/junit-php${{ matrix.php-version }}-upgrade-6-[hash].xml
      env:
        CYPRESS_UPGRADE_SQL_FILE: cypress/fixtures/upgrade/churchcrm-6.0.0.sql
        CYPRESS_UPGRADE_ADMIN_USER: Admin
        CYPRESS_UPGRADE_ADMIN_PASS: changeme

    - name: Collect Docker logs on failure
      if: failure()
      run: |
        mkdir -p cypress/logs/docker cypress/logs/php
        docker compose -f docker/docker-compose.yaml -f docker/docker-compose.parallel.yaml --profile ci-new-system logs > cypress/logs/docker/docker-compose-php${{ matrix.php-version }}-upgrade-6.log 2>&1 || true
        docker compose -f docker/docker-compose.yaml -f docker/docker-compose.parallel.yaml --profile ci-new-system ps -a >> cypress/logs/docker/docker-compose-php${{ matrix.php-version }}-upgrade-6.log 2>&1 || true
        [ -d src/logs ] && cp -r src/logs cypress/logs/php/ || true

    - name: Upload debug artifacts
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: cypress-artifacts-php${{ matrix.php-version }}-upgrade-6-${{ github.run_id }}
        path: |
          cypress/logs
          cypress/screenshots
          cypress/videos
        retention-days: 15
        if-no-files-found: ignore

    - name: Test Report
      uses: dorny/test-reporter@v3
      if: always()
      with:
        name: 'PHP ${{ matrix.php-version }}: Upgrade from 6.0.0'
        path: cypress/reports/junit-php${{ matrix.php-version }}-upgrade-6-*.xml
        reporter: java-junit
        fail-on-error: true
        fail-on-empty: false
        list-suites: all
        list-tests: failed
        max-annotations: 50
        use-actions-summary: true

    - name: Stop Docker
      if: always()
      run: npm run docker:ci:new-system:down

  # ---------------------------------------------------------------------------
  # Upgrade test: ChurchInfo 1.3.1 → current
  # Restores a ChurchInfo 1.3.1 SQL snapshot (MD5 password hashes), lets the
  # bootstrapper auto-migrate, and verifies login (MD5→bcrypt migration) +
  # API smoke checks. Requires User::isPasswordValid() MD5 support (this PR).
  # ---------------------------------------------------------------------------
  test-upgrade-from-churchinfo:
    needs: [configure, build]
    timeout-minutes: 30
    permissions:
      contents: read
      checks: write
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php-version: ${{ fromJSON(needs.configure.outputs.php-versions) }}
    steps:
    - name: Checkout
      uses: actions/checkout@v7

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version-file: '.nvmrc'
        cache: 'npm'

    - name: Install npm dependencies
      run: npm ci

    - name: Download build artifact
      uses: actions/download-artifact@v8.0.1
      with:
        name: build-${{ github.run_id }}
        path: .

    - name: Load Docker image
      run: |
        docker load < temp/docker-image-${{ matrix.php-version }}.tar.gz
        docker tag churchcrm/crm:php${{ matrix.php-version }}-test churchcrm/crm:php8-debian

    - name: Generate file signatures
      run: node scripts/generate-signatures-node.js

    - name: Remove Config.php for fresh install
      run: rm -f src/Include/Config.php

    - name: Start Docker (upgrade from ChurchInfo)
      run: docker compose -f docker/docker-compose.yaml -f docker/docker-compose.parallel.yaml --profile ci-new-system up -d

    - name: Wait for server
      run: |
        max_attempts=12
        attempt=1
        until curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8081/ | grep -q "302\|200"; do
          if [ $attempt -eq $max_attempts ]; then
            echo "Server failed to respond after $max_attempts attempts"
            docker compose -f docker/docker-compose.yaml -f docker/docker-compose.parallel.yaml --profile ci-new-system ps -a
            docker compose -f docker/docker-compose.yaml -f docker/docker-compose.parallel.yaml --profile ci-new-system logs
            exit 1
          fi
          echo "Attempt $attempt/$max_attempts — retrying in 5s..."
          sleep 5
          attempt=$((attempt + 1))
        done
        echo "Server ready."

    - name: Run Cypress upgrade test (ChurchInfo 1.3.1 → current, PHP ${{ matrix.php-version }})
      uses: cypress-io/github-action@v7
      with:
        command: npx cypress run --config-file cypress/configs/upgrade.config.ts --headless --browser electron --reporter junit --reporter-options mochaFile=cypress/reports/junit-php${{ matrix.php-version }}-upgrade-churchinfo-[hash].xml
      env:
        CYPRESS_UPGRADE_SQL_FILE: cypress/fixtures/upgrade/churchinfo-1.3.1.sql
        CYPRESS_UPGRADE_ADMIN_USER: Admin
        CYPRESS_UPGRADE_ADMIN_PASS: churchinfoadmin
        CYPRESS_UPGRADE_FORCE_PASSWORD_CHANGE: 'true'

    - name: Collect Docker logs on failure
      if: failure()
      run: |
        mkdir -p cypress/logs/docker cypress/logs/php
        docker compose -f docker/docker-compose.yaml -f docker/docker-compose.parallel.yaml --profile ci-new-system logs > cypress/logs/docker/docker-compose-php${{ matrix.php-version }}-upgrade-churchinfo.log 2>&1 || true
        docker compose -f docker/docker-compose.yaml -f docker/docker-compose.parallel.yaml --profile ci-new-system ps -a >> cypress/logs/docker/docker-compose-php${{ matrix.php-version }}-upgrade-churchinfo.log 2>&1 || true
        [ -d src/logs ] && cp -r src/logs cypress/logs/php/ || true

    - name: Upload debug artifacts
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: cypress-artifacts-php${{ matrix.php-version }}-upgrade-churchinfo-${{ github.run_id }}
        path: |
          cypress/logs
          cypress/screenshots
          cypress/videos
        retention-days: 15
        if-no-files-found: ignore

    - name: Test Report
      uses: dorny/test-reporter@v3
      if: always()
      with:
        name: 'PHP ${{ matrix.php-version }}: Upgrade from ChurchInfo 1.3.1'
        path: cypress/reports/junit-php${{ matrix.php-version }}-upgrade-churchinfo-*.xml
        reporter: java-junit
        fail-on-error: true
        fail-on-empty: false
        list-suites: all
        list-tests: failed
        max-annotations: 50
        use-actions-summary: true

    - name: Stop Docker
      if: always()
      run: npm run docker:ci:new-system:down
