name: Build, Test and Package

on:
  pull_request:
    branches:
      - master
      - develop
      - 'hotfix/**'
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
      - '.ddev/**'
  push:
    branches:
      - master
      - develop
      - 'hotfix/**'
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
      - '.ddev/**'

jobs:
  build:
    timeout-minutes: 30
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version-file: '.nvmrc'
        cache: 'npm'

    - name: Declare variables
      id: vars
      shell: bash
      run: |
        branch_name="${GITHUB_REF#refs/heads/}"
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          branch_name="pr-${{ github.event.number }}"
        fi
        safe_branch=$(echo "$branch_name" | sed 's/[\/\\<>:"|?*]/-/g')
        echo "branch=$branch_name" >> $GITHUB_OUTPUT
        echo "safe_branch=$safe_branch" >> $GITHUB_OUTPUT

    - name: Get package version
      id: package-version
      run: echo "current-version=$(node -p 'require("./package.json").version')" >> $GITHUB_OUTPUT

    - name: Install npm dependencies
      run: npm ci

    - name: Set up PHP 8.4
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.4'
        extensions: pdo_mysql, mysqli, gd, zip, gettext, iconv, mbstring, xml, curl, fileinfo, bcmath, sodium
        coverage: none

    - name: Get Composer cache directory
      id: composer-cache
      run: |
        cd src
        echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

    - name: Cache Composer packages
      uses: actions/cache@v5
      with:
        path: ${{ steps.composer-cache.outputs.dir }}
        key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
        restore-keys: ${{ runner.os }}-composer-

    - name: Install Composer dependencies
      env:
        COMPOSER_MEMORY_LIMIT: -1
      run: |
        cd src
        composer install --no-dev --no-interaction --prefer-dist

    - name: Build app
      run: npm run package

    - name: Validate PHP syntax
      run: npm run build:php:validate

    - name: Build Docker image
      run: |
        docker build --target test -t churchcrm/crm:php8-debian \
          -f docker/Dockerfile.churchcrm-apache-php8 docker/
        docker save churchcrm/crm:php8-debian | gzip > temp/docker-image.tar.gz
        echo "Docker image saved: $(du -h temp/docker-image.tar.gz | cut -f1)"

    - name: Upload build artifact
      uses: actions/upload-artifact@v7
      with:
        name: build-${{ github.run_id }}
        path: |
          src/
          temp/
          !src/logs
        retention-days: 1

  test-root:
    needs: build
    timeout-minutes: 30
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version-file: '.nvmrc'
        cache: 'npm'

    - name: Install npm dependencies
      run: npm ci

    - name: Download build artifact
      uses: actions/download-artifact@v8.0.1
      with:
        name: build-${{ github.run_id }}
        path: .

    - name: Load Docker image
      run: docker load < temp/docker-image.tar.gz

    - name: Start Docker (root path)
      run: |
        cp docker/Config.root.php src/Include/Config.php
        docker compose -f docker/docker-compose.yaml -f docker/docker-compose.parallel.yaml --profile ci-root up -d

    - name: Wait for server (root path)
      run: |
        max_attempts=12
        attempt=1
        until curl -sf http://127.0.0.1/api/public/echo; do
          if [ $attempt -eq $max_attempts ]; then
            echo "Server failed to respond after $max_attempts attempts"
            docker compose -f docker/docker-compose.yaml -f docker/docker-compose.parallel.yaml --profile ci-root ps -a
            docker compose -f docker/docker-compose.yaml -f docker/docker-compose.parallel.yaml --profile ci-root logs
            exit 1
          fi
          echo "Attempt $attempt/$max_attempts — retrying in 5s..."
          sleep 5
          attempt=$((attempt + 1))
        done
        echo "Server ready."

    - name: Run Cypress tests (root path)
      uses: cypress-io/github-action@v7
      with:
        command: npx cypress run --config-file cypress/configs/docker.config.ts --browser electron --reporter junit --reporter-options mochaFile=cypress/reports/junit-root-[filename].xml

    - name: Collect Docker logs on failure
      if: failure()
      run: |
        mkdir -p cypress/logs/docker cypress/logs/php
        docker compose -f docker/docker-compose.yaml -f docker/docker-compose.parallel.yaml --profile ci-root logs > cypress/logs/docker/docker-compose-root.log 2>&1 || true
        docker compose -f docker/docker-compose.yaml -f docker/docker-compose.parallel.yaml --profile ci-root ps -a >> cypress/logs/docker/docker-compose-root.log 2>&1 || true
        [ -d src/logs ] && cp -r src/logs cypress/logs/php/ || true

    - name: Upload debug artifacts
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: cypress-artifacts-root-${{ github.run_id }}
        path: |
          cypress/logs
          cypress/screenshots
          cypress/videos
        retention-days: 30
        if-no-files-found: ignore

    - name: Upload test reports
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: test-reports-root
        path: cypress/reports/junit-root-*.xml
        retention-days: 3
        if-no-files-found: ignore

    - name: Stop Docker
      if: always()
      run: npm run docker:ci:root:down

  test-subdir:
    needs: build
    timeout-minutes: 30
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version-file: '.nvmrc'
        cache: 'npm'

    - name: Install npm dependencies
      run: npm ci

    - name: Download build artifact
      uses: actions/download-artifact@v8.0.1
      with:
        name: build-${{ github.run_id }}
        path: .

    - name: Load Docker image
      run: docker load < temp/docker-image.tar.gz

    - name: Start Docker (subdirectory path)
      run: |
        cp docker/Config.parallel.subdir.php src/Include/Config.php
        docker compose -f docker/docker-compose.yaml -f docker/docker-compose.parallel.yaml --profile ci-subdir up -d

    - name: Wait for server (subdirectory path)
      run: |
        max_attempts=12
        attempt=1
        until curl -sf http://127.0.0.1:8080/churchcrm/api/public/echo; do
          if [ $attempt -eq $max_attempts ]; then
            echo "Server failed to respond after $max_attempts attempts"
            docker compose -f docker/docker-compose.yaml -f docker/docker-compose.parallel.yaml --profile ci-subdir ps -a
            docker compose -f docker/docker-compose.yaml -f docker/docker-compose.parallel.yaml --profile ci-subdir logs
            exit 1
          fi
          echo "Attempt $attempt/$max_attempts — retrying in 5s..."
          sleep 5
          attempt=$((attempt + 1))
        done
        echo "Server ready."

    - name: Run Cypress tests (subdirectory path)
      uses: cypress-io/github-action@v7
      with:
        command: npx cypress run --config-file cypress/configs/docker.config.ts --browser electron --reporter junit --reporter-options mochaFile=cypress/reports/junit-subdir-[filename].xml
      env:
        CYPRESS_BASE_URL: http://127.0.0.1:8080/churchcrm/

    - name: Collect Docker logs on failure
      if: failure()
      run: |
        mkdir -p cypress/logs/docker cypress/logs/php
        docker compose -f docker/docker-compose.yaml -f docker/docker-compose.parallel.yaml --profile ci-subdir logs > cypress/logs/docker/docker-compose-subdir.log 2>&1 || true
        docker compose -f docker/docker-compose.yaml -f docker/docker-compose.parallel.yaml --profile ci-subdir ps -a >> cypress/logs/docker/docker-compose-subdir.log 2>&1 || true
        [ -d src/logs ] && cp -r src/logs cypress/logs/php/ || true

    - name: Upload debug artifacts
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: cypress-artifacts-subdir-${{ github.run_id }}
        path: |
          cypress/logs
          cypress/screenshots
          cypress/videos
        retention-days: 30
        if-no-files-found: ignore

    - name: Upload test reports
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: test-reports-subdir
        path: cypress/reports/junit-subdir-*.xml
        retention-days: 3
        if-no-files-found: ignore

    - name: Stop Docker
      if: always()
      run: npm run docker:ci:subdir:down

  test-new-system:
    needs: build
    timeout-minutes: 30
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version-file: '.nvmrc'
        cache: 'npm'

    - name: Install npm dependencies
      run: npm ci

    - name: Download build artifact
      uses: actions/download-artifact@v8.0.1
      with:
        name: build-${{ github.run_id }}
        path: .

    - name: Load Docker image
      run: docker load < temp/docker-image.tar.gz

    - name: Generate file signatures
      run: node scripts/generate-signatures-node.js

    - name: Remove Config.php for fresh install test
      run: rm -f src/Include/Config.php

    - name: Start Docker (new system)
      run: docker compose -f docker/docker-compose.yaml -f docker/docker-compose.parallel.yaml --profile ci-new-system up -d

    - name: Wait for server (new system)
      run: |
        max_attempts=12
        attempt=1
        until curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8081/ | grep -q "302\|200"; do
          if [ $attempt -eq $max_attempts ]; then
            echo "Server failed to respond after $max_attempts attempts"
            docker compose -f docker/docker-compose.yaml -f docker/docker-compose.parallel.yaml --profile ci-new-system ps -a
            docker compose -f docker/docker-compose.yaml -f docker/docker-compose.parallel.yaml --profile ci-new-system logs
            exit 1
          fi
          echo "Attempt $attempt/$max_attempts — retrying in 5s..."
          sleep 5
          attempt=$((attempt + 1))
        done
        echo "Server ready."

    - name: Run Cypress tests (setup wizard)
      uses: cypress-io/github-action@v7
      with:
        command: npx cypress run --config-file cypress/configs/new-system.config.ts --browser electron --reporter junit --reporter-options mochaFile=cypress/reports/junit-new-system-[filename].xml

    - name: Collect Docker logs on failure
      if: failure()
      run: |
        mkdir -p cypress/logs/docker cypress/logs/php
        docker compose -f docker/docker-compose.yaml -f docker/docker-compose.parallel.yaml --profile ci-new-system logs > cypress/logs/docker/docker-compose-new-system.log 2>&1 || true
        docker compose -f docker/docker-compose.yaml -f docker/docker-compose.parallel.yaml --profile ci-new-system ps -a >> cypress/logs/docker/docker-compose-new-system.log 2>&1 || true
        [ -d src/logs ] && cp -r src/logs cypress/logs/php/ || true

    - name: Upload debug artifacts
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: cypress-artifacts-new-system-${{ github.run_id }}
        path: |
          cypress/logs
          cypress/screenshots
          cypress/videos
        retention-days: 30
        if-no-files-found: ignore

    - name: Upload test reports
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: test-reports-new-system
        path: cypress/reports/junit-new-system-*.xml
        retention-days: 3
        if-no-files-found: ignore

    - name: Stop Docker
      if: always()
      run: npm run docker:ci:new-system:down

  test-new-system-subdir:
    needs: build
    timeout-minutes: 30
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version-file: '.nvmrc'
        cache: 'npm'

    - name: Install npm dependencies
      run: npm ci

    - name: Download build artifact
      uses: actions/download-artifact@v8.0.1
      with:
        name: build-${{ github.run_id }}
        path: .

    - name: Load Docker image
      run: docker load < temp/docker-image.tar.gz

    - name: Generate file signatures
      run: node scripts/generate-signatures-node.js

    - name: Remove Config.php for fresh install test
      run: rm -f src/Include/Config.php

    - name: Start Docker (new system subdirectory)
      run: npm run docker:ci:new-system:subdir:start

    - name: Wait for server (new system subdirectory)
      run: |
        max_attempts=12
        attempt=1
        until curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8081/churchcrm/ | grep -q "302\|200"; do
          if [ $attempt -eq $max_attempts ]; then
            echo "Server failed to respond after $max_attempts attempts"
            docker compose -f docker/docker-compose.yaml -f docker/docker-compose.parallel.yaml -f docker/docker-compose.subdir.yaml --profile ci-new-system ps -a
            docker compose -f docker/docker-compose.yaml -f docker/docker-compose.parallel.yaml -f docker/docker-compose.subdir.yaml --profile ci-new-system logs
            exit 1
          fi
          echo "Attempt $attempt/$max_attempts — retrying in 5s..."
          sleep 5
          attempt=$((attempt + 1))
        done
        echo "Server ready."

    - name: Run Cypress tests (setup wizard subdirectory)
      uses: cypress-io/github-action@v7
      with:
        command: npx cypress run --config-file cypress/configs/new-system.config.ts --browser electron --reporter junit --reporter-options mochaFile=cypress/reports/junit-new-system-subdir-[filename].xml
      env:
        CYPRESS_BASE_URL: http://127.0.0.1:8081/churchcrm/

    - name: Collect Docker logs on failure
      if: failure()
      run: |
        mkdir -p cypress/logs/docker cypress/logs/php
        docker compose -f docker/docker-compose.yaml -f docker/docker-compose.parallel.yaml -f docker/docker-compose.subdir.yaml --profile ci-new-system logs > cypress/logs/docker/docker-compose-new-system-subdir.log 2>&1 || true
        docker compose -f docker/docker-compose.yaml -f docker/docker-compose.parallel.yaml -f docker/docker-compose.subdir.yaml --profile ci-new-system ps -a >> cypress/logs/docker/docker-compose-new-system-subdir.log 2>&1 || true
        [ -d src/logs ] && cp -r src/logs cypress/logs/php/ || true

    - name: Upload debug artifacts
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: cypress-artifacts-new-system-subdir-${{ github.run_id }}
        path: |
          cypress/logs
          cypress/screenshots
          cypress/videos
        retention-days: 30
        if-no-files-found: ignore

    - name: Upload test reports
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: test-reports-new-system-subdir
        path: cypress/reports/junit-new-system-subdir-*.xml
        retention-days: 3
        if-no-files-found: ignore

    - name: Stop Docker
      if: always()
      run: npm run docker:ci:new-system:subdir:down

  test-report:
    needs: [test-root, test-subdir, test-new-system, test-new-system-subdir]
    if: always()
    timeout-minutes: 5
    permissions:
      contents: read
      checks: write
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        ref: ${{ github.event.pull_request.head.sha || github.sha }}

    - name: Download root path reports
      uses: actions/download-artifact@v8.0.1
      with:
        name: test-reports-root
        path: reports/root
      continue-on-error: true

    - name: Download subdirectory reports
      uses: actions/download-artifact@v8.0.1
      with:
        name: test-reports-subdir
        path: reports/subdir
      continue-on-error: true

    - name: Download new system reports
      uses: actions/download-artifact@v8.0.1
      with:
        name: test-reports-new-system
        path: reports/new-system
      continue-on-error: true

    - name: Download new system subdirectory reports
      uses: actions/download-artifact@v8.0.1
      with:
        name: test-reports-new-system-subdir
        path: reports/new-system-subdir
      continue-on-error: true

    - name: Report — Root Path
      uses: dorny/test-reporter@v3
      if: always()
      with:
        name: 'Cypress: Root Path'
        path: reports/root/*.xml
        reporter: java-junit
        fail-on-error: true
        fail-on-empty: false
        list-suites: failed
        list-tests: failed
        max-annotations: 50

    - name: Report — Subdirectory
      uses: dorny/test-reporter@v3
      if: always()
      with:
        name: 'Cypress: Subdirectory'
        path: reports/subdir/*.xml
        reporter: java-junit
        fail-on-error: true
        fail-on-empty: false
        list-suites: failed
        list-tests: failed
        max-annotations: 50

    - name: Report — New System Setup (Root)
      uses: dorny/test-reporter@v3
      if: always()
      with:
        name: 'Cypress: New System Setup (Root)'
        path: reports/new-system/*.xml
        reporter: java-junit
        fail-on-error: true
        fail-on-empty: false
        list-suites: failed
        list-tests: failed
        max-annotations: 50

    - name: Report — New System Setup (Subdirectory)
      uses: dorny/test-reporter@v3
      if: always()
      with:
        name: 'Cypress: New System Setup (Subdirectory)'
        path: reports/new-system-subdir/*.xml
        reporter: java-junit
        fail-on-error: true
        fail-on-empty: false
        list-suites: failed
        list-tests: failed
        max-annotations: 50

  package:
    needs: [test-root, test-subdir, test-new-system, test-new-system-subdir]
    timeout-minutes: 15
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version-file: '.nvmrc'
        cache: 'npm'

    - name: Declare variables
      id: vars
      shell: bash
      run: |
        branch_name="${GITHUB_REF#refs/heads/}"
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          branch_name="pr-${{ github.event.number }}"
        fi
        safe_branch=$(echo "$branch_name" | sed 's/[\/\\<>:"|?*]/-/g')
        echo "branch=$branch_name" >> $GITHUB_OUTPUT
        echo "safe_branch=$safe_branch" >> $GITHUB_OUTPUT

    - name: Get package version
      id: package-version
      run: echo "current-version=$(node -p 'require("./package.json").version')" >> $GITHUB_OUTPUT

    - name: Download build artifact
      uses: actions/download-artifact@v8.0.1
      with:
        name: build-${{ github.run_id }}
        path: .

    - name: Upload release artifact
      uses: actions/upload-artifact@v7
      with:
        name: >-
          ${{ github.ref == 'refs/heads/master' &&
              format('ChurchCRM-{0}', steps.package-version.outputs.current-version) ||
              (github.event_name == 'pull_request' &&
               format('ChurchCRM-{0}-PR{1}', steps.package-version.outputs.current-version, github.event.number) ||
               format('ChurchCRM-{0}-{1}', steps.package-version.outputs.current-version, steps.vars.outputs.safe_branch)) }}
        path: temp/ChurchCRM-*.zip
        retention-days: 90
        if-no-files-found: error

    - name: Build summary
      if: always()
      run: |
        echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Version:** ${{ steps.package-version.outputs.current-version }}" >> $GITHUB_STEP_SUMMARY
        echo "**Branch:** ${{ steps.vars.outputs.branch }}" >> $GITHUB_STEP_SUMMARY
        echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Tests:**" >> $GITHUB_STEP_SUMMARY
        echo "- Root path installation" >> $GITHUB_STEP_SUMMARY
        echo "- Subdirectory installation" >> $GITHUB_STEP_SUMMARY
        echo "- New system setup wizard (root)" >> $GITHUB_STEP_SUMMARY
        echo "- New system setup wizard (subdirectory)" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        if [ -d "temp" ]; then
          echo "**Artifacts:**" >> $GITHUB_STEP_SUMMARY
          for file in temp/ChurchCRM-*.zip; do
            [ -f "$file" ] && echo "- \`$(basename "$file")\` ($(du -h "$file" | cut -f1))" >> $GITHUB_STEP_SUMMARY
          done
        fi
