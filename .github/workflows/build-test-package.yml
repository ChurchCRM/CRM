        path: |
          cypress/logs
          cypress/screenshots
          cypress/videos
        retention-days: 30
        if-no-files-found: ignore

    - name: Test Report
      uses: dorny/test-reporter@v3
      if: always()
      with:
        name: 'PHP ${{ matrix.php-version }}: New System Setup (Subdirectory)'
        path: cypress/reports/junit-php${{ matrix.php-version }}-new-system-subdir-*.xml
        reporter: java-junit
        fail-on-error: true
        fail-on-empty: false
        list-suites: all
        list-tests: failed
        max-annotations: 50
        use-actions-summary: true

    - name: Stop Docker
      if: always()
      run: npm run docker:ci:new-system:subdir:down

