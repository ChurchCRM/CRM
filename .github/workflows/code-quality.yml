name: CI — Typecheck, Lint & Format

on:
  push:
    branches:
      - master
      - develop
      - 'hotfix/**'
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
      - '.ddev/**'
  pull_request:
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
      - '.ddev/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck-and-lint:
    name: Typecheck & Lint
    timeout-minutes: 15
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Use Node.js (from .nvmrc)
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Typecheck (tsc)
        run: npx tsc --noEmit --pretty
      - name: Format check (biome)
        run: npx biome format .
      - name: Lint check (biome)
        run: npx biome check webpack/

  format-fix:
    name: Apply format fixes
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    timeout-minutes: 15
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}
          persist-credentials: true
      - name: Use Node.js (from .nvmrc)
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Apply Biome format
        run: npx biome format --write .
      - name: Apply Biome lint fixes
        run: npx biome check --write webpack/
      - name: Commit format changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No formatting changes to commit"
          else
            git commit -m "style: apply Biome format and lint fixes"
            # Try to push to the PR branch; if it fails (branch missing or protected), warn but don't fail the job
            git push origin "HEAD:${{ github.head_ref }}" || true
          fi
