name: Release: Changelog, Milestones & Marketing

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


# Fires automatically when a release is published.
# Can also be triggered manually to re-sync or back-fill any version.
#
# For full releases (non-pre-release):
#   1. Writes changelog/<tag>.md from the GitHub Release title + body.
#   2. Inserts a new row in CHANGELOG.md and commits to master.
#   3. Generates X / Facebook / LinkedIn marketing posts and attaches
#      them as a downloadable artifact on this Actions run.
#   4. Closes the release milestone and moves pending issues/PRs to next version.
#
# For pre-releases: Only runs steps 1-3 (skips milestone cleanup).

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to sync (e.g. 7.3.0)'
        required: true
        type: string
      force:
        description: 'Overwrite changelog/<tag>.md if it already exists'
        required: false
        type: boolean
        default: false

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN:          ${{ github.token }}
      GH_REPO:           ${{ github.repository }}
      GITHUB_TOKEN:      ${{ github.token }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      # Auto-trigger: release tag. Manual trigger: workflow_dispatch input.
      TAG: ${{ github.event.release.tag_name || inputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: master

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Sync changelog file and CHANGELOG.md table
        env:
          FORCE: ${{ inputs.force == true && '--force' || '' }}
        run: node scripts/release-changelog.js "$TAG" $FORCE

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md "changelog/${TAG}.md"
          if git diff --cached --quiet; then
            echo "Nothing to commit — files already up to date."
          else
            git commit -m "chore(changelog): sync ${TAG} release notes"
            git push origin master
          fi

      - name: Generate marketing posts
        run: |
          mkdir -p /tmp/marketing
          node scripts/release-marketing.js "$TAG" > "/tmp/marketing/${TAG}-social-posts.md"

      - name: Attach marketing posts as artifact
        uses: actions/upload-artifact@v7
        with:
          name: marketing-posts-${{ env.TAG }}
          path: /tmp/marketing/${{ env.TAG }}-social-posts.md
          retention-days: 30

  # ───────────────────────────────────────────────────────────────────
  # Close release milestone and move pending items to next version
  # ───────────────────────────────────────────────────────────────────
  manage-milestones:
    # Only runs on automatic trigger (when release is published) and NOT pre-releases
    # Manual sync runs and pre-releases don't close/move milestones
    if: github.event_name == 'release' && !github.event.release.prerelease
    needs: sync
    name: Close release milestone
    timeout-minutes: 10
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
    steps:
      - name: Determine next version from master package.json
        id: next_version
        run: |
          pkg_b64=$(gh api "repos/$GH_REPO/contents/package.json?ref=master" --jq '.content')
          next_version=$(echo "$pkg_b64" | base64 -d | node -e "let s='';process.stdin.on('data',d=>s+=d).on('end',()=>console.log(JSON.parse(s).version))")
          echo "next_version=$next_version" >> "$GITHUB_OUTPUT"
          echo "Next version from master: $next_version"

      - name: Close current milestone and move pending items
        env:
          CURRENT_TAG: ${{ env.TAG }}
          NEXT_VERSION: ${{ steps.next_version.outputs.next_version }}
        run: |
          set -euo pipefail

          echo "=== Release Milestone Management ==="
          echo "Current release: $CURRENT_TAG"
          echo "Next version: $NEXT_VERSION"
          echo ""

          # Find the current milestone by title (matching the tag)
          current_milestone=$(gh api repos/$GH_REPO/milestones \
            --jq ".[] | select(.title == \"$CURRENT_TAG\") | .number" | head -n 1)

          if [ -z "$current_milestone" ]; then
            echo "⚠️  No milestone found for tag $CURRENT_TAG — skipping milestone management"
            exit 0
          fi

          echo "Found current milestone #$current_milestone for $CURRENT_TAG"

          # Find or create the next milestone
          next_milestone=$(gh api repos/$GH_REPO/milestones \
            --jq ".[] | select(.title == \"$NEXT_VERSION\") | .number" | head -n 1)

          if [ -z "$next_milestone" ]; then
            echo "Creating new milestone for $NEXT_VERSION..."
            next_milestone=$(gh api repos/$GH_REPO/milestones \
              -f title="$NEXT_VERSION" \
              --jq ".number")
            echo "Created milestone #$next_milestone"
          else
            echo "Found existing milestone #$next_milestone for $NEXT_VERSION"
          fi

          echo ""
          echo "Moving open issues and PRs from #$current_milestone to #$next_milestone..."
          echo ""

          # Find all open issues in current milestone (exclude PRs)
          issue_count=0
          while IFS= read -r issue_num; do
            gh issue edit "$issue_num" -m "$next_milestone" 2>/dev/null || true
            ((issue_count++))
            echo "  Moved issue #$issue_num"
          done < <(gh api repos/$GH_REPO/issues \
            --jq ".[] | select(.milestone.number == $current_milestone and .state == \"open\" and .pull_request == null) | .number")

          # Find all open PRs in current milestone
          pr_count=0
          while IFS= read -r pr_num; do
            gh pr edit "$pr_num" -m "$next_milestone" 2>/dev/null || true
            ((pr_count++))
            echo "  Moved PR #$pr_num"
          done < <(gh api repos/$GH_REPO/issues \
            --jq ".[] | select(.milestone.number == $current_milestone and .state == \"open\" and .pull_request != null) | .number")

          echo ""
          echo "Closing milestone #$current_milestone ($CURRENT_TAG)..."
          gh api repos/$GH_REPO/milestones/$current_milestone \
            -f state="closed" \
            --silent

          echo ""
          echo "✓ Release milestone management complete"
          echo "  Moved $issue_count issues and $pr_count PRs to $NEXT_VERSION"
          echo "  Closed milestone #$current_milestone"
